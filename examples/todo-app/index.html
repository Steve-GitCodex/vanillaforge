<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - VanillaForge Example</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            color: #0f172a;
            min-height: 100vh;
            padding: 48px 20px;
        }

        .todo-app {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e6e8ec;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .todo-header {
            background: radial-gradient(120% 140% at 50% -20%, #233044 0%, #0b1020 100%);
            color: #f8fafc;
            padding: 32px 30px;
            text-align: center;
        }

        .todo-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .todo-header p {
            color: #9aa6b8;
            font-size: 0.95rem;
        }

        .todo-content {
            padding: 30px;
        }

        .todo-input-section {
            margin-bottom: 30px;
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
        }

        .todo-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .todo-input:focus {
            outline: none;
            border-color: #f97316;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #f97316;
            color: #1a1206;
        }

        .btn-primary:hover {
            background: #fb923c;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #6c757d;
            border: 1px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .todo-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .todo-stats {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff7ed;
            border-radius: 8px;
            color: #9a3412;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
        }

        .todo-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .empty-state-icon {
            display: inline-flex;
            color: #f97316;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .todo-input-group {
                flex-direction: column;
            }
            
            .todo-filters {
                flex-direction: column;
            }
            
            .todo-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .todo-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { createApp, BaseComponent } from '../../src/framework.js';

        class TodoApp extends BaseComponent {
            constructor(eventBus, props) {
                // CSS is inline in this single-file example, so skip auto-loading.
                super(eventBus, { autoLoadCSS: false, ...props });
                this.name = 'todo';
                this.state = {
                    todos: this.loadTodos(),
                    newTodo: '',
                    filter: 'all' // all, active, completed
                };
            }

            loadTodos() {
                try {
                    const saved = localStorage.getItem('vanillaforge-todos');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    console.warn('Failed to load todos from localStorage:', error);
                    return [];
                }
            }

            saveTodos() {
                try {
                    localStorage.setItem('vanillaforge-todos', JSON.stringify(this.state.todos));
                } catch (error) {
                    console.warn('Failed to save todos to localStorage:', error);
                }
            }

            getTemplate() {
                const filteredTodos = this.getFilteredTodos();
                const stats = this.getTodoStats();

                return `
                    <div class="todo-app">
                        <div class="todo-header">
                            <h1>Todo</h1>
                            <p>Built with VanillaForge</p>
                        </div>
                        
                        <div class="todo-content">
                            <div class="todo-input-section">
                                <div class="todo-input-group">
                                    <input
                                        type="text"
                                        class="todo-input"
                                        placeholder="What needs to be done?"
                                        value="${this.state.newTodo}"
                                        data-input="handleInput"
                                        data-keydown="handleKeyDown"
                                    >
                                    <button class="btn btn-primary" data-action="addTodo">
                                        Add Todo
                                    </button>
                                </div>
                            </div>

                            ${stats.total > 0 ? `
                                <div class="todo-stats">
                                    <strong>Stats:</strong> 
                                    ${stats.total} total, 
                                    ${stats.active} active, 
                                    ${stats.completed} completed
                                </div>

                                <div class="todo-filters">
                                    <button class="btn ${this.state.filter === 'all' ? 'btn-primary' : 'btn-secondary'} btn-sm" 
                                            data-action="setFilter" data-filter="all">
                                        All (${stats.total})
                                    </button>
                                    <button class="btn ${this.state.filter === 'active' ? 'btn-primary' : 'btn-secondary'} btn-sm" 
                                            data-action="setFilter" data-filter="active">
                                        Active (${stats.active})
                                    </button>
                                    <button class="btn ${this.state.filter === 'completed' ? 'btn-primary' : 'btn-secondary'} btn-sm" 
                                            data-action="setFilter" data-filter="completed">
                                        Completed (${stats.completed})
                                    </button>
                                    ${stats.completed > 0 ? `
                                        <button class="btn btn-danger btn-sm" data-action="clearCompleted">
                                            Clear Completed
                                        </button>
                                    ` : ''}
                                </div>
                            ` : ''}

                            ${filteredTodos.length > 0 ? `
                                <ul class="todo-list">
                                    ${filteredTodos.map((todo, index) => `
                                        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-key="${todo.id}">
                                            <input
                                                type="checkbox"
                                                class="todo-checkbox"
                                                ${todo.completed ? 'checked' : ''}
                                                data-change="toggleTodo"
                                                data-id="${todo.id}"
                                            >
                                            <span class="todo-text">${this.escapeHtml(todo.text)}</span>
                                            <div class="todo-actions">
                                                <button class="btn btn-secondary btn-sm" 
                                                        data-action="editTodo" data-id="${todo.id}">
                                                    Edit
                                                </button>
                                                <button class="btn btn-danger btn-sm" 
                                                        data-action="deleteTodo" data-id="${todo.id}">
                                                    Delete
                                                </button>
                                            </div>
                                        </li>
                                    `).join('')}
                                </ul>
                            ` : `
                                <div class="empty-state">
                                    <div class="empty-state-icon">
                                        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <path d="M9 11l3 3L22 4"/>
                                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                        </svg>
                                    </div>
                                    <h3>${this.getEmptyMessage()}</h3>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }

            getFilteredTodos() {
                switch (this.state.filter) {
                    case 'active':
                        return this.state.todos.filter(todo => !todo.completed);
                    case 'completed':
                        return this.state.todos.filter(todo => todo.completed);
                    default:
                        return this.state.todos;
                }
            }

            getTodoStats() {
                return {
                    total: this.state.todos.length,
                    active: this.state.todos.filter(todo => !todo.completed).length,
                    completed: this.state.todos.filter(todo => todo.completed).length
                };
            }

            getEmptyMessage() {
                switch (this.state.filter) {
                    case 'active':
                        return 'No active todos! 🎉';
                    case 'completed':
                        return 'No completed todos yet';
                    default:
                        return this.state.todos.length === 0 
                            ? 'No todos yet. Add one above!' 
                            : 'No todos match the current filter';
                }
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            getMethods() {
                return {
                    addTodo: () => {
                        const text = this.state.newTodo.trim();
                        if (text) {
                            const newTodo = {
                                id: Date.now(),
                                text: text,
                                completed: false,
                                createdAt: new Date().toISOString()
                            };
                            
                            this.setState({ 
                                todos: [...this.state.todos, newTodo],
                                newTodo: ''
                            });
                            this.saveTodos();
                        }
                    },

                    toggleTodo: (e) => {
                        const id = parseInt(e.target.dataset.id);
                        const updatedTodos = this.state.todos.map(todo =>
                            todo.id === id ? { ...todo, completed: !todo.completed } : todo
                        );
                        
                        this.setState({ todos: updatedTodos });
                        this.saveTodos();
                    },

                    deleteTodo: (e) => {
                        const id = parseInt(e.target.dataset.id);
                        const updatedTodos = this.state.todos.filter(todo => todo.id !== id);
                        
                        this.setState({ todos: updatedTodos });
                        this.saveTodos();
                    },

                    editTodo: (e) => {
                        const id = parseInt(e.target.dataset.id);
                        const todo = this.state.todos.find(todo => todo.id === id);
                        
                        if (todo) {
                            const newText = prompt('Edit todo:', todo.text);
                            if (newText && newText.trim() !== todo.text) {
                                const updatedTodos = this.state.todos.map(t =>
                                    t.id === id ? { ...t, text: newText.trim() } : t
                                );
                                
                                this.setState({ todos: updatedTodos });
                                this.saveTodos();
                            }
                        }
                    },

                    setFilter: (e) => {
                        const filter = e.target.dataset.filter;
                        this.setState({ filter });
                    },

                    clearCompleted: () => {
                        const updatedTodos = this.state.todos.filter(todo => !todo.completed);
                        this.setState({ todos: updatedTodos });
                        this.saveTodos();
                    },

                    handleInput: (e) => {
                        // Track the field value without re-rendering on every
                        // keystroke; the morph keeps the input in sync on the
                        // next render (e.g. after adding a todo).
                        this.setState({ newTodo: e.target.value }, false);
                    },

                    handleKeyDown: (e) => {
                        if (e.key === 'Enter') {
                            this.getMethods().addTodo();
                        }
                    }
                };
            }

            getLifecycle() {
                return {
                    // Event wiring is fully declarative (data-action / data-change
                    // / data-input / data-keydown) and handled by the framework's
                    // delegation, so no manual listeners are needed here.
                    onMount: async () => {
                        this.logger.info('Todo app mounted');
                    },

                    onUnmount: () => {
                        this.logger.info('Todo app unmounted');
                    }
                };
            }
        }

        // Derive the base path from wherever this page is served (e.g.
        // "/examples/todo-app") so history-mode routing resolves to "/".
        const basePath = window.location.pathname
            .replace(/\/[^/]*\.[^/]*$/, '') // drop a trailing file (index.html)
            .replace(/\/$/, '');            // drop trailing slash

        // Initialize the app. The single page mounts components into #app.
        const app = createApp({
            appName: 'VanillaForge Todo App',
            mountId: 'app',
            router: { basePath },
            debug: true
        });

        await app.initialize({
            routes: { 
                '/': TodoApp,
                '/todos': TodoApp
            },
            components: { 
                'todo-app': TodoApp 
            }
        });

        await app.start();
    </script>
</body>
</html>
