<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Dynamic base tag for GitHub Pages support -->
    <script>
        if (window.location.hostname.includes('github.io')) {
            const base = document.createElement('base');
            base.href = '/vanillaforge/';
            document.head.appendChild(base);
        }
    </script>
    <title>VanillaForge - Modern Vanilla JavaScript SPA Framework</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/components/sweet-alert.css">
    <style>
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            height: 100vh;
            color: #64748b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.9rem;
        }

        .loading-spinner {
            width: 34px;
            height: 34px;
            border: 3px solid #e6e8ec;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="main-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading VanillaForge…</div>
            </div>
        </div>
    </div>
    <script type="module" src="src/app.js"></script>
</body>
</html>
